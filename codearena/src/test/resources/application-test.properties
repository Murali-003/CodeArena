# Test profile - uses H2 in-memory database instead of MySQL
spring.datasource.url=jdbc:h2:mem:codearena_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests — JPA creates schema via ddl-auto
spring.flyway.enabled=false

# JWT config for tests
jwt.secret=ZmYzY2Q2MjNhMWQ2YjIyODQ5MzQ0ZjE4ZmU2YmYxM2MzODNmYjVmODQ1NTEzMmE0NTY0ZDYxYjYzMzM2NTM0Yw==
jwt.expiration=86400000

# Suppress noisy startup logs in test output
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.autoconfigure=WARN
